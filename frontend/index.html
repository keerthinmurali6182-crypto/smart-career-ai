<!DOCTYPE html>
<html>
<head>
    <title>Smart Career AI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🚀 Smart Career AI</h1>

    <form id="form">
        <label>Upload Resume (PDF)</label><br>
        <input type="file" name="resume" accept=".pdf" required><br><br>

        <label>Paste Job Description</label>
        <textarea name="job_desc" placeholder="Enter job description here..." required></textarea>

        <button type="submit">Analyze Resume</button>
    </form>

    <div id="result"></div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "<p class='loading'>⏳ Analyzing...</p>";

    let formData = new FormData(e.target);

    try {
        let res = await fetch("https://smart-career-ai.onrender.com/analyze", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        resultDiv.innerHTML = `
            <h2>✅ Match Score: ${data.match_score}%</h2>

            <h3>❌ Missing Skills:</h3>
            <ul>
                ${data.missing_skills.map(skill => `<li>${skill}</li>`).join("")}
            </ul>
        `;
    } catch (error) {
        resultDiv.innerHTML = `<p style="color:red;">❌ Error: Unable to connect to server</p>`;
        console.error(error);
    }
};
</script>

</body>
</html>
